name: (reusable) Go Security Checks

on: workflow_call

env:
  GO_VERSION: 1.26

jobs:
  gosec:
    name: Run security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Gosec Security Scanner
        run: make sec
