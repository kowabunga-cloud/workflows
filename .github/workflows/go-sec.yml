name: (reusable) Go Security Checks

on: workflow_call

env:
  GO_VERSION: 1.26
  CHECKOUT_VERSION: 6
  SETUP_GO_VERSION: 6

jobs:
  gosec:
    name: Run security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v${{ env.CHECKOUT_VERSION }}
      - name: Setup Go
        uses: actions/setup-go@v${{ env.SETUP_GO_VERSION }}
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Gosec Security Scanner
        run: make sec
