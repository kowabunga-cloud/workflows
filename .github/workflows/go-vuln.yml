name: (reusable) Go Vulnerabilities Check

on:
  workflow_call:
    inputs:
      pkgs:
        required: false
        type: string

env:
  GO_VERSION: 1.26

jobs:
  govulncheck:
    name: Run vulnerability checks
    runs-on: ubuntu-latest

    steps:
      - name: Update packages
        run: sudo apt-get update
      - name: Install package dependencies
        run: sudo apt-get install -y debhelper ${{ inputs.pkgs }}
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run GoVulnCheck security scanner
        run: make vuln
